name: Main CI/CD

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

# call-release uses softprops/action-gh-release@v2 which needs
# contents: write to create a GitHub Release. Reusable workflow
# permissions intersect with the caller's, and GitHub Actions'
# default GITHUB_TOKEN is read-only, so this grant must live here
# (release-worker.yaml declaring it upstream is not enough).
permissions:
  contents: write

jobs:
  call-docker-build:
    uses: ycpss91255-docker/base/.github/workflows/build-worker.yaml@v0.40.0
    with:
      image_name: docker
      # Isaac Sim base image is itself the runtime (15+ GB binary tree);
      # stripping to a separate "runtime" stage would save little while
      # forcing duplicate /isaac-sim copies. The runtime stage in
      # Dockerfile is intentionally commented out — disable the
      # base repo's build_runtime default so CI doesn't try to target it.
      build_runtime: false
      # Isaac Sim BASE_IMAGE is ~15 GB extracted; ubuntu-latest's ~14 GB
      # free disk is below threshold, so attempt 1 of every Isaac PR
      # rolls the dice on "no space left on device" during BuildKit COPY
      # (PR #68 attempt 1 lost, attempt 2 passed by timing luck). The
      # opt-in step from base#470 removes ~30 GB of Android SDK / .NET /
      # GHC tool-cache before buildx starts.
      free_disk_space: true

  # Per ADR-0011 (ycpss91255/isaac): Python tests run on the
  # self-hosted GPU runner because Isaac Sim Kit refuses to boot
  # without an NVIDIA GPU runtime. This job runs in parallel with
  # call-docker-build (which uses GHA hosted runner and covers
  # Dockerfile build + bats smoke). Outside-collaborator PRs do NOT
  # auto-trigger -- the org-level "Approval for outside collaborators"
  # gate (All outside collaborators) holds them until maintainer
  # approves.
  python-tests:
    runs-on: [self-hosted, gpu]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build test image (devel-test stage, cached if unchanged)
        run: ./script/build.sh -t test

      - name: Run pytest in test container
        run: |
          set -euo pipefail
          # Skip cleanly until Python smoke / unit / integration tests land.
          # Per isaac#64 the layout segregates tools under test/<cat>/<tool>/,
          # so detection looks for test/<cat>/pytest/ directories rather than
          # the legacy test/<cat>/ (which still hosts .bats files exercised by
          # call-docker-build's RUN bats /smoke_test/).
          if [ ! -d test/unit/pytest ] && \
             [ ! -d test/smoke/pytest ] && \
             [ ! -d test/integration/pytest ]; then
            echo "no test/<category>/pytest/ directory -- skip"
            exit 0
          fi
          # base v0.40.0 detect_ws_path falls back to `dirname` when the
          # checkout dir is not named *_ws or docker_*; on this org-level
          # self-hosted runner that picks _work/isaac (the parent of
          # $GITHUB_WORKSPACE = _work/isaac/isaac), so the workspace mount
          # lands one level too high and pytest cannot find test/ at the
          # expected path. Pin WS_PATH explicitly post-build. .env hash
          # markers are unrelated to WS_PATH, so this edit does not
          # trigger run.sh's drift-regen path.
          sed -i "s|^WS_PATH=.*|WS_PATH=${GITHUB_WORKSPACE}|" .env
          # run.sh -t test -- <cmd> = `compose up -d test` + `compose exec test <cmd>`.
          # devel-test stage CMD = sleep infinity keeps the container alive
          # for the exec'd pytest invocation. compose-down handled by run.sh
          # auto-cleanup.
          ./script/run.sh -t test -- \
            /isaac-sim/python.sh -m pytest test/ -v --tb=short

  call-release:
    needs: call-docker-build
    if: startsWith(github.ref, 'refs/tags/')
    uses: ycpss91255-docker/base/.github/workflows/release-worker.yaml@v0.40.0
    with:
      archive_name_prefix: docker
