name: Main CI/CD

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

# call-release uses softprops/action-gh-release@v2 which needs
# contents: write to create a GitHub Release. Reusable workflow
# permissions intersect with the caller's, and GitHub Actions'
# default GITHUB_TOKEN is read-only, so this grant must live here
# (release-worker.yaml declaring it upstream is not enough).
permissions:
  contents: write

jobs:
  call-docker-build:
    uses: ycpss91255-docker/base/.github/workflows/build-worker.yaml@v0.41.0
    with:
      image_name: docker
      # Isaac Sim base image is itself the runtime (15+ GB binary tree);
      # stripping to a separate "runtime" stage would save little while
      # forcing duplicate /isaac-sim copies. The runtime stage in
      # Dockerfile is intentionally commented out — disable the
      # base repo's build_runtime default so CI doesn't try to target it.
      build_runtime: false
      # Isaac Sim BASE_IMAGE is ~15 GB extracted; ubuntu-latest's ~14 GB
      # free disk is below threshold, so attempt 1 of every Isaac PR
      # rolls the dice on "no space left on device" during BuildKit COPY
      # (PR #68 attempt 1 lost, attempt 2 passed by timing luck). The
      # opt-in step from base#470 removes ~30 GB of Android SDK / .NET /
      # GHC tool-cache before buildx starts.
      free_disk_space: true

  # Per ADR-0011 (ycpss91255/isaac): Python tests run on the
  # self-hosted GPU runner because Isaac Sim Kit refuses to boot
  # without an NVIDIA GPU runtime. This job runs in parallel with
  # call-docker-build (which uses GHA hosted runner and covers
  # Dockerfile build + bats smoke). Outside-collaborator PRs do NOT
  # auto-trigger -- the org-level "Approval for outside collaborators"
  # gate (All outside collaborators) holds them until maintainer
  # approves.
  python-tests:
    runs-on: [self-hosted, gpu]
    timeout-minutes: 30
    steps:
      # Pre-checkout self-heal: the GPU devel-test container writes into the
      # bind-mounted workspace, and any file it leaves root-owned makes the
      # next actions/checkout clean step fail with EACCES on this non-root
      # (yunchien) runner -- the job dies at checkout before any test runs.
      # A throwaway root container can unlink those files, so run it before
      # checkout to keep the workspace clean every run (no manual sudo). The
      # in-workflow equivalent of the runner-level safeguard proposed in
      # ycpss91255-docker/github_runner#77. GITHUB_WORKSPACE always exists by
      # the time a step runs, so the bind mount never auto-creates it.
      - name: Pre-checkout cleanup (clear stale root-owned residue)
        run: |
          docker run --rm -v "${GITHUB_WORKSPACE}":/w -w /w busybox:1 sh -c '
            find . -type d -name __pycache__ -prune -exec rm -rf {} + 2>/dev/null
            find . -type f -name "*.pyc" -delete 2>/dev/null
            rm -f test/.gpu-pytest-report.xml test/.xc-pytest-report.xml 2>/dev/null
            rm -rf isaac-sim 2>/dev/null
            true'

      - name: Checkout
        uses: actions/checkout@v6

      # M1 stage gate (ADR-0017 section 7, isaac#130): hosted unit pytest
      # needs no Isaac runtime and no GPU, so it runs in a plain Python
      # container and gates every PR. The script enforces all-green +
      # collected >= the committed baseline (ratchet) + framework
      # pure-surface coverage >= 80%. This is the M1 acceptance floor.
      - name: Hosted unit pytest + baseline + coverage gate
        run: ./test/assert_pytest_baseline.sh

      # base detect_ws_path mis-detects the self-CI _work/<repo>/<repo>
      # layout: none of its strategies (docker_* sibling, *_ws ancestor)
      # match, so the parent-dir fallback returns _work/<repo> -- one level
      # too high, leaving the repo at ~/work/<repo>/ inside the container.
      # config/docker/setup.conf ships mount_1 in portable ${WS_PATH} form,
      # so apply re-detects WS_PATH locally and ignores a job-env override.
      # Pin it in the derived .env.generated cache AFTER apply (the
      # --env-file the wrappers pass to compose) so the devel-test compose
      # mounts the repo root at ~/work -- fixing both the relative GPU test
      # path (test/integration/pytest/) and the baked
      # PYTHONPATH=~/work/framework. base follow-up: base#586.
      - name: Generate .env + compose.yaml (devel-test GPU override)
        run: |
          ./script/setup.sh apply
          sed -i "s|^WS_PATH=.*|WS_PATH=${GITHUB_WORKSPACE}|" .env.generated

      - name: Build test image (devel-test stage, cached if unchanged)
        run: ./script/build.sh -t test

      # Pre-create the Isaac Sim cache mount sources writable. The
      # devel-test compose bind-mounts ${WS_PATH}/isaac-sim/* (kit / ov /
      # nvidia shader + compute caches) into the container. With WS_PATH
      # pinned to the checkout root these sources do not pre-exist, so the
      # docker daemon (root) auto-creates them root-owned -- and the
      # container runs as the non-root image user, so it cannot write them.
      # The symptom is silent: the RTX Hydra engine + shader cache fail to
      # initialize ("Creating driver shaderCache directory failed",
      # "unable to create shared hydra engine context ... type: rtx"), no
      # camera frames are ever rendered, and the L3 / scaffold / cuda
      # camera assertions fail with no obvious cause. Creating the leaf
      # dirs here (as the runner user) makes the mounts writable. They are
      # gitignored and cleared pre-checkout, so the cache is cold each run.
      - name: Pre-create Isaac Sim cache mount dirs (writable)
        run: |
          mkdir -p \
            isaac-sim/kit/cache isaac-sim/kit/data isaac-sim/kit/logs \
            isaac-sim/ov/cache isaac-sim/ov/data isaac-sim/ov/logs \
            isaac-sim/pip isaac-sim/nvidia/glcache \
            isaac-sim/nvidia/computecache isaac-sim/documents

      # M2 GPU integration gate (PRD #4-int / isaac#132): boots headless
      # Isaac for real on the self-hosted GPU runner and runs the example
      # strong-assertion suite (L1-L4 + cmd_vel round-trip) plus the #127
      # camera smoke. assert_pytest_baseline.sh --gpu enforces: the GPU
      # suite actually RAN (passed > 0 -- a skipped GPU job is NOT green),
      # collected >= GPU_INTEGRATION_BASELINE (ratchet), and the
      # cross-runner aggregate (HOSTED_UNIT + GPU_INTEGRATION) >=
      # AGGREGATE_TARGET (the PRD 126 parity floor). With WS_PATH pinned to
      # the checkout root in .env.generated (apply step above), the repo
      # root mounts at ~/work, so the in-container test path is
      # test/integration/pytest/ (the default).
      - name: GPU integration pytest + aggregate gate (M2)
        run: ./test/assert_pytest_baseline.sh --gpu

  call-release:
    needs: call-docker-build
    if: startsWith(github.ref, 'refs/tags/')
    uses: ycpss91255-docker/base/.github/workflows/release-worker.yaml@v0.41.0
    with:
      archive_name_prefix: docker
