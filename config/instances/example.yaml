# Per-instance compose overlay template (base #465).
#
# Loaded automatically by `./run.sh --instance <name>` (deep-merged over
# compose.yaml) together with <name>.env (--env-file). Copy to
# config/instances/<name>.yaml alongside <name>.env.
#
# Purpose:
#   - remap the lock-prone caches (kit / ov / nvidia) to this instance's
#     INSTANCE_CACHE_DIR so concurrent instances never share a cache
#     (Isaac's file locks crash on shared access);
#   - carry the per-instance livestream ports into the container env so
#     runheadless-host-config.sh builds the matching Kit args.
#
# ${INSTANCE_CACHE_DIR} / ${ISAAC_*_PORT} / ${USER_NAME} resolve from
# <name>.env + the repo .env at `run.sh --instance` time.
#
# NOTE: compose merges `volumes` by container (target) path, so these
# entries override the matching default mounts; work / pip / documents
# stay shared from compose.yaml.

x-instance-cache: &instance-cache
  - ${INSTANCE_CACHE_DIR}/kit/cache:/isaac-sim/kit/cache
  - ${INSTANCE_CACHE_DIR}/kit/data:/isaac-sim/kit/data
  - ${INSTANCE_CACHE_DIR}/kit/logs:/isaac-sim/kit/logs
  - ${INSTANCE_CACHE_DIR}/ov/cache:/home/${USER_NAME}/.cache/ov
  - ${INSTANCE_CACHE_DIR}/ov/data:/home/${USER_NAME}/.local/share/ov/data
  - ${INSTANCE_CACHE_DIR}/ov/logs:/home/${USER_NAME}/.nvidia-omniverse/logs
  - ${INSTANCE_CACHE_DIR}/nvidia/glcache:/home/${USER_NAME}/.cache/nvidia/GLCache
  - ${INSTANCE_CACHE_DIR}/nvidia/computecache:/home/${USER_NAME}/.nv/ComputeCache

services:
  stream:
    environment:
      - ISAAC_SIGNAL_PORT=${ISAAC_SIGNAL_PORT}
      - ISAAC_MEDIA_PORT=${ISAAC_MEDIA_PORT}
      - ISAAC_API_PORT=${ISAAC_API_PORT}
    volumes: *instance-cache

  headless:
    volumes: *instance-cache
